<html lang="en">
    <head>
        <style>
            body{
                background-color : grey;
                color :black;
                text-align:center;
                border:2px solid pink;
                cellpadding:10px;
            }

        </style>
    </head>
<body>
    <h1 id="myclock"></h1>
    <script>
        function myclock(){
            let now=new Date();
            let h=now.getHours();
            let m=now.getMinutes();
            let s=now.getSeconds();
            let mer=now.getHours()>=12?"PM":"AM";
            mer="PM";
            if(h<10){
                h=h+"0";
            }
            if(m<10){
                m=m+"0";
            }
            if(s<10){
                s=s+"0";
            }

            document.getElementById("myclock").innerHTML=h+":"+m+":"+s+":"+mer;
        }
        setInterval(myclock,1000);
    </script>
   
</body>
</html>
